<!DOCTYPE html> 
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday Jesica</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Montserrat:wght@400;700;900&display=swap');

* { margin:0; padding:0; box-sizing:border-box; }

body {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  font-family: 'Montserrat', sans-serif;
  overflow-x: hidden;
  overflow-y: auto;
  position: relative;
  background: #050a1a;
}

/* SLIDESHOW */
.slide {
  position: fixed;
  inset: 0;
  background-size: cover;
  background-position: center;
  opacity: 0;
  transition: opacity 1.2s ease;
  z-index: 0;
}
.slide.active { opacity: 1; }

.slide-overlay {
  position: fixed;
  inset: 0;
  background: linear-gradient(to bottom, rgba(3,6,18,0.7), rgba(3,6,18,0.85));
  z-index: 1;
}

/* CONFETTI */
#confettiCanvas {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 5;
}

/* MAIN */
#main {
  position: relative;
  z-index: 20;
  text-align: center;
  padding: 40px 20px 120px;
  max-width: 820px;
  width: 100%;
}

/* TITLE */
.name-title {
  font-family: 'Playfair Display', serif;
  font-size: clamp(2rem, 7vw, 4.2rem);
  font-weight: 900;
  color: #fff;
  opacity: 0;
  transform: translateY(-24px);
  transition: 0.8s;
}
.name-title.visible { opacity:1; transform:translateY(0); }
.name-title span { color:#ff6b00; }

/* DIVIDER */
.divider {
  width:110px; height:3px;
  background: linear-gradient(90deg, transparent, #ff6b00, transparent);
  margin: 14px auto 26px;
  opacity: 0;
  transition: 1s;
}
.divider.visible { opacity:1; }

/* LYRICS */
.lyrics-container {
  display:flex;
  flex-direction:column;
  gap:10px;
}

.lyric-line {
  font-size: clamp(1rem, 3vw, 1.5rem);
  color: rgba(255,255,255,0.25);
  transition: 0.4s;
}

.lyric-line.active {
  color:#ff6b00;
  transform: scale(1.05);
}

.lyric-line.done {
  color: rgba(255,255,255,0.5);
}

.hooray-word {
  font-family:'Playfair Display', serif;
  color:#ff6b00;
}

.hooray-word.shake {
  animation: shake 0.5s;
}

@keyframes shake {
  0% { transform:translateX(0); }
  25% { transform:translateX(-6px); }
  50% { transform:translateX(6px); }
  75% { transform:translateX(-3px); }
  100% { transform:translateX(0); }
}

/* SCREEN SHAKE */
body.screen-shake {
  animation: screenShake 0.5s ease;
}

@keyframes screenShake {
  0% { transform: translate(0,0); }
  20% { transform: translate(-8px,5px); }
  40% { transform: translate(8px,-5px); }
  60% { transform: translate(-6px,3px); }
  80% { transform: translate(6px,-3px); }
  100% { transform: translate(0,0); }
}

/* DOTS */
.dots {
  position: fixed;
  bottom: 30px;
  left:50%;
  transform:translateX(-50%);
  display:flex;
  gap:8px;
  z-index:20;
}
.dot {
  width:7px;height:7px;
  background:#aaa;
  border-radius:50%;
}
.dot.active {
  background:#ff6b00;
  transform:scale(1.3);
}

.sub-text {
  margin-top:20px;
  opacity:0;
  transition:1s;
}
.sub-text.visible { opacity:1; }

</style>
</head>

<body>

<div id="slideshow"></div>
<div class="slide-overlay"></div>
<canvas id="confettiCanvas"></canvas>
<div class="dots" id="dots"></div>

<div id="main">
  <div class="name-title" id="nameTitle">Happy Birthday <span>Jesica</span></div>
  <div class="divider" id="divider"></div>
  <div class="lyrics-container" id="lyricsContainer"></div>
</div>

<script>

/* ✅ IMAGES (.JPEG) */
const IMAGES = [
  "J1.jpeg",
  "J2.jpeg",
  "J3.jpeg",
  "J4.jpeg",
  "J5.jpeg",
  "J6.jpeg"
];

/* SLIDESHOW */
const slideshow = document.getElementById('slideshow');
const dotsEl = document.getElementById('dots');

const slides = IMAGES.map((src,i)=>{
  const d=document.createElement('div');
  d.className='slide'+(i===0?' active':'');
  d.style.backgroundImage=`url(${src})`;
  slideshow.appendChild(d);

  const dot=document.createElement('div');
  dot.className='dot'+(i===0?' active':'');
  dotsEl.appendChild(dot);

  return d;
});

const dots = dotsEl.querySelectorAll('.dot');
let current = 0;

setInterval(()=>{
  slides[current].classList.remove('active');
  dots[current].classList.remove('active');
  current = (current+1)%IMAGES.length;
  slides[current].classList.add('active');
  dots[current].classList.add('active');
},3500);

/* 🎉 CONFETTI */
const canvas = document.getElementById("confettiCanvas");
const ctx = canvas.getContext("2d");

function resizeCanvas() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resizeCanvas();
window.addEventListener("resize", resizeCanvas);

let confetti = [];

function spawnConfetti(count = 25) {
  const emojis = ["🎉","🎊","🎂","🎁","✨","🎈"];

  for (let i = 0; i < count; i++) {
    confetti.push({
      x: Math.random() * canvas.width,
      y: -20,
      speed: 2 + Math.random() * 3,
      drift: (Math.random() - 0.5) * 2,
      emoji: emojis[Math.floor(Math.random() * emojis.length)],
      size: 20 + Math.random() * 10
    });
  }
}

function drawConfetti() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  confetti = confetti.filter(p => {
    p.y += p.speed;
    p.x += p.drift;
    if (p.y > canvas.height) return false;

    ctx.font = p.size + "px serif";
    ctx.fillText(p.emoji, p.x, p.y);
    return true;
  });

  requestAnimationFrame(drawConfetti);
}
drawConfetti();

/* 💥 SCREEN SHAKE */
function shakeScreen() {
  document.body.classList.remove('screen-shake');
  void document.body.offsetWidth;
  document.body.classList.add('screen-shake');

  setTimeout(() => {
    document.body.classList.remove('screen-shake');
  }, 500);
}

/* SONG */
const lines = [
  "Happy Birthday to you",
  "Happy Birthday to you",
  "Happy Birthday dear Jesica",
  "Happy Birthday to you",
  "Hip hip...",
  "Hooray!",
  "Hip hip...",
  "Hooray!",
  "Hip hip...",
  "Hooray!"
];

const container = document.getElementById('lyricsContainer');
const nameTitle = document.getElementById('nameTitle');
const divider = document.getElementById('divider');
const subText = document.getElementById('subText');

const elements = lines.map((text,i)=>{
  const div=document.createElement('div');
  div.className='lyric-line';

  if(text==="Hooray!"){
    div.innerHTML=`<span class="hooray-word" id="h${i}">Hooray!</span>`;
  } else {
    div.textContent=text;
  }

  container.appendChild(div);
  return div;
});

function runSong(){
  nameTitle.classList.add('visible');
  divider.classList.add('visible');

  let i=0;

  function next(){
    if(i>=elements.length){
      subText.classList.add('visible');
      spawnConfetti(40);
      return;
    }

    if(i>0){
      elements[i-1].classList.remove('active');
      elements[i-1].classList.add('done');
    }

    elements[i].classList.add('active');

    /* AUTO SCROLL */
    if(i>=4){
      elements[i].scrollIntoView({
        behavior:"smooth",
        block:"center"
      });
    }

    /* 🎉 HOORAY EFFECT */
    if(lines[i]==="Hooray!"){
      const el=document.getElementById("h"+i);
      el.classList.remove("shake");
      void el.offsetWidth;
      el.classList.add("shake");

      spawnConfetti(30);
      shakeScreen();
    }

    i++;
    setTimeout(next,2000);
  }

  setTimeout(next,600);
}

runSong();

</script>

</body>
</html>
